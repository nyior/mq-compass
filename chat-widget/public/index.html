<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MQ Compass Widget Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto max-w-4xl px-6 py-20">
      <p class="mb-3 text-sm uppercase tracking-[0.3em] text-cyan-300">MQ Compass Demo</p>
      <h1 class="max-w-2xl text-4xl font-semibold leading-tight">Embeddable docs assistant for LavinMQ product pages</h1>
      <p class="mt-6 max-w-2xl text-lg text-slate-300">
        This page simulates a docs or blog page. The widget is mounted at the bottom right and calls the retrieval API.
      </p>
    </main>

    <script src="/src/widget.js"></script>
    <script>
      window.MQCompassWidget.mount({
        apiBaseUrl: "http://127.0.0.1:8203",
        productName: "LavinMQ"
      });
    </script>
  </body>
  </html>
