version: "3.9"

services:
  crawler:
    build: ./crawler
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - shared_data:/data

  ingestion_worker:
    build: ./ingestion_service
    env_file:
      - .env
    volumes:
      - shared_data:/data

  retrieval_service:
    build: ./retrieval_service
    ports:
      - "8000:8000"
    env_file:
      - .env

  web_widget:
    build: ./chat_widget
    ports:
      - "3000:3000"
    env_file:
      - .env

volumes:
  shared_data:
